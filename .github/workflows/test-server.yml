name: server

on:
    pull_request:
        branches:
            - main

permissions:
    contents: read
    packages: write
    pull-requests: write

jobs:
    test:
        name: Test Server
        runs-on: ubuntu-latest
        env:
            IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:pr-${{ github.event.pull_request.number }}

        steps:
            - uses: actions/checkout@v6

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build Docker image
              run: docker build --build-arg BUILD_VERSION=pr-${{ github.event.pull_request.number }} -t ${{ env.IMAGE_TAG }} .

            - name: Push Docker image
              if: github.actor == github.repository_owner
              run: docker push ${{ env.IMAGE_TAG }}

            - name: Comment on PR
              uses: marocchino/sticky-pull-request-comment@v2
              if: github.actor == github.repository_owner
              with:
                header: docker-test-pr
                message: |
                    You can pull and run this PR's version of linkdave using:
                    ```bash
                    docker pull ${{ env.IMAGE_TAG }}
                    ```